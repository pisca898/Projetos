<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
      body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif ;
  background: linear-gradient(1000deg, rgba(4, 149, 245, 0.849), rgba(242, 247, 1, 0.877) );
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.weatherForm{
  margin: 20px;
}

.cityInput{
  padding: 15px;
  font-size: 25px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 60px;
  margin: 1px;
  width: 250px;
  background: linear-gradient(rgba(255, 254, 254, 0.199));
}

button[type='submit']{
  margin-bottom: 20px;
  padding: 9px 9px;
  font-size: 39px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  cursor: pointer;
}

button[type='submit']:hover{
  background-color: hsla(140, 1%, 47%, 0.226);
}

.card{
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 50px;
  min-width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-radius: 60px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

h1{
  margin-top: 0;
  margin-bottom: 25px;
}

p{
  font-size: 1.5rem;
  margin: 5px 0;
}

.cityDisplay, .tempDisplay{
  font-size: 3.5rem;
  font-weight: bold;
  color: hsla(0, 0%,0%,0.75);
  margin-bottom: 25px;
}

.humidityDisplay{
  font-weight: bold;
  margin-bottom: 25px;
}

.descDisplay{
  font-style: italic;
  font-weight: bold;
  font-size: 2rem;
}

.weatherEmoji{
  margin: 0;
  font-size: 7.5rem;
}

.errordisplay{
  font-size: 2.5rem;
  font-weight: bold;
  color: rgba(0, 0, 0, 0.75);
}
    </style>
    
  </head>
  <body>

      <form class="weatherForm">
        <input type="text" class="cityInput" placeholder="Nome da Cidade">
        <button type="submit">🔎</button>
      </form>

      <div class="card" style="display: none;">
        
      </div>
    
      <script>
        
      </script>
  </body>
</html>
