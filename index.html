<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <style>
      body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif ;
  background: linear-gradient(1000deg, rgba(4, 149, 245, 0.849), rgba(242, 247, 1, 0.877) );
  margin: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.weatherForm{
  margin: 20px;
}

.cityInput{
  padding: 15px;
  font-size: 25px;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
  font-weight: 600;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 60px;
  margin: 1px;
  width: 250px;
  background: linear-gradient(rgba(255, 254, 254, 0.199));
}

button[type='submit']{
  margin-bottom: 20px;
  padding: 9px 9px;
  font-size: 39px;
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  color: white;
  border: 1px solid rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  cursor: pointer;
}

button[type='submit']:hover{
  background-color: hsla(140, 1%, 47%, 0.226);
}

.card{
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.3);
  padding: 50px;
  min-width: 300px;
  display: flex;
  flex-direction: column;
  align-items: center;
  border-radius: 60px;
  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
}

h1{
  margin-top: 0;
  margin-bottom: 25px;
}

p{
  font-size: 1.5rem;
  margin: 5px 0;
}

.cityDisplay, .tempDisplay{
  font-size: 3.5rem;
  font-weight: bold;
  color: hsla(0, 0%,0%,0.75);
  margin-bottom: 25px;
}

.humidityDisplay{
  font-weight: bold;
  margin-bottom: 25px;
}

.descDisplay{
  font-style: italic;
  font-weight: bold;
  font-size: 2rem;
}

.weatherEmoji{
  margin: 0;
  font-size: 7.5rem;
}

.errordisplay{
  font-size: 2.5rem;
  font-weight: bold;
  color: rgba(0, 0, 0, 0.75);
}
    </style>
    
  </head>
  <body>

      <form class="weatherForm">
        <input type="text" class="cityInput" placeholder="Nome da Cidade">
        <button type="submit">🔎</button>
      </form>

      <div class="card" style="display: none;">
        
      </div>
    
      <script>
        const weatherForm = document.querySelector('.weatherForm')
const cityInput = document.querySelector('.cityInput')
const card = document.querySelector('.card')
const apiKey = (insira sua chave API aqui)

weatherForm.addEventListener('submit', async event => {

  event.preventDefault()
 
  const city = cityInput.value
   
  if(city){
    try{
      const weatherData = await getWeatherData(city)
      displayWeatherInfo(weatherData)
    }
    catch(error){
        console.error(error)
        displayError(error)
    }
    
  }
  else{
    displayError('Insira uma cidade')
  }

})

async function getWeatherData(city){
  

  const apiUrl = `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}`

  const response = await fetch(apiUrl)

  if(!response.ok){
    throw new Error('Não foi possivel encontrar informações sobre o clima')

  }
  console.log(response)

  return await response.json()
  
}

function displayWeatherInfo(data){

  const {name: city, 
        main: {temp, humidity}, 
        weather: [{description, id}]} = data

    card.textContent = ''
    card.style.display = 'flex'

    const cityDisplay = document.createElement('h1')
    const tempDisplay = document.createElement('p')
    const humidityDisplay = document.createElement('p')
    const descDisplay = document.createElement('p')
    const weatherEmoji = document.createElement('p')

    cityDisplay.textContent = city
    tempDisplay.textContent = `${(temp - 273.15).toFixed(1)}°C`
    humidityDisplay.textContent = `Umidade:${humidity}% `
    descDisplay.textContent = description
    weatherEmoji.textContent = getWeatherEmoji(id)

    cityDisplay.classList.add('cityDisplay')
    tempDisplay.classList.add('tempDisplay')
    humidityDisplay.classList.add('humidityDisplay')
    descDisplay.classList.add('descDisplay')
    weatherEmoji.classList.add('weatherEmoji')

    card.appendChild(cityDisplay)
    card.appendChild(tempDisplay)
    card.appendChild(humidityDisplay)
    card.appendChild(descDisplay)
    card.appendChild(weatherEmoji)

}

function getWeatherEmoji (weatherId){

  switch(true){
    case(weatherId >= 200 && weatherId < 300):
    return '⛈️';
    case(weatherId >= 300 && weatherId < 400):
    return '🌧️';
    case(weatherId >= 500 && weatherId < 600):
    return '🌧️';
    case(weatherId >= 600 && weatherId < 700):
    return '❄️';
    case(weatherId >= 700 && weatherId < 800):
    return '🌫️';
    case(weatherId === 800):
    return '☀️';
    case(weatherId >= 801 && weatherId < 810):
    return '☁️';
    default:
      return "❔"
  }

}

function displayError(message){

  const errorDisplay = document.createElement('p') 
  errorDisplay.textContent = message
  errorDisplay.classList.add('errorDisplay')

  card.textContent= ''
  card.style.display = 'flex'
  card.appendChild(errorDisplay)
}
      </script>
  </body>
</html>
